  <body>
    <p>kjhkjhlkjkgkhk33333333</p>
    <script
      src="https://code.jquery.com/jquery-3.2.1.min.js"
      integrity="sha256-hwg4gsxgFZhOsEEamdOYGBf13FyQuiTwlAQgxVSNgt4="
      crossorigin="anonymous"></script>
    <script>
        (function() {
            var instaRedirect = {
                // cookieName: 'disableInstaRedirect',
                // cookieExpiresTime: 1, // in minutes
                userAgent: navigator.userAgent,

                isInstaBrowser: function() {
                    return /instagram/i.test(this.userAgent)
                },

                isAndroid: function() {
                    return /android/i.test(this.userAgent);
                },

                isIOS: function() {
                  console.log(/iphone|ipad|ipod/i.test(this.userAgent));
                    return /iphone|ipad|ipod/i.test(this.userAgent);
                },

                // isDisabledRedirect: function() {
                //     return $.cookie(instaRedirect.cookieName);
                // },

                isWindowFocused: function() {
                    instaRedirect.isFocused = true;
                    window.onfocus = function(){
                        instaRedirect.isFocused = true;
                    };
                    window.onblur = function(){
                        instaRedirect.isFocused = false;
                    };
                },

                createFrame: function() {
                    var f = document.createElement('iframe');
                    f.src = 'https://google.com/';
                    f.style.display = 'none';

                    return document.body.appendChild(f);
                },

                deleteFrame: function(f) {
                    document.body.removeChild(f);
                },

                setLocation: function(url) {
                    if (!instaRedirect.isFocused) return Promise.resolve();

                    return new Promise(function(resolve, reject) {
                        var frame = instaRedirect.createFrame();

                        frame.onload = function() {
                            frame.contentWindow.parent.location = url;
                            instaRedirect.deleteFrame(frame);
                            setTimeout(function() {
                                resolve();
                            }, 100);
                        };
                    });
                },

                getLinkForAndroid: function(clearUrl, protocol, packageStr, targetLink) {
                    return 'intent://' + clearUrl + '#Intent' +
                        ';scheme=' + protocol + ';package=' + packageStr +
                        ';S.browser_fallback_url=' + encodeURIComponent(targetLink) + ';end'
                },

                openInBrowser: function(targetLink) {
                    var url = new URL(targetLink),
                        protocol = url.protocol.replace(':', ''),
                        // cookie = $.cookie('getParamsRef'),
                        // getParams = cookie ? '?' + cookie : '',
                        hash = url.hash,
                        // getParams
                        clearUrl = url.hostname + url.pathname + hash;

                    if (this.isAndroid()) {
                        var openInChrome = this.getLinkForAndroid(clearUrl, protocol, 'com.android.chrome', targetLink);
                        // var openInOpera = this.getLinkForAndroid(clearUrl, protocol, 'com.opera.browser', targetLink);
                        // var openInFireFox = this.getLinkForAndroid(clearUrl, protocol, 'org.mozilla.firefox', targetLink);
                        var openInNativeBrowser = this.getLinkForAndroid(clearUrl, protocol, 'com.android.browser', targetLink);

                        instaRedirect.setLocation(openInChrome).then(function() {
                            setTimeout(function() {
                                instaRedirect.setLocation(openInNativeBrowser)
                            }, 1000);
                        });

                    } else if (this.isIOS()) {
                            instaRedirect.setLocation(protocol + '://' + clearUrl);

                        // instaRedirect.setLocation('googlechrome://' + clearUrl).then(function() {
                        //     // instaRedirect.setLocation('/ios-redirect.php')
                        //     instaRedirect.setLocation(protocol + '://' + clearUrl);
                        // });

                    } else {

                        instaRedirect.setLocation(protocol + '://' + clearUrl);
                    }

                    // var date = new Date();
                    // date.setTime(date.getTime() + (instaRedirect.cookieExpiresTime * 60 * 1000));
                    // $.cookie(instaRedirect.cookieName, 'true', { expires: date });
                }
            };
// && !instaRedirect.isDisabledRedirect()
            // if (instaRedirect.isInstaBrowser()) {
                instaRedirect.isWindowFocused();
                instaRedirect.openInBrowser(location.href);
            // }

        })();
    </script>
