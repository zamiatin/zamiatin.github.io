<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="img/favicon.png" sizes="32x32">
    <title>350% БОНУСА на депозит - VulkanStars - твоя игровая звезда!</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
  </head>
  <body>
    <a href="">
      <div class="container-bg">
        <div class="container">
          <div class="header">
            <img src="img/logo.png" class="logo" alt="logo" />
            <img src="img/header-text.png" class="headerText" alt="Vulkanstars" />
          </div>
          <div class="main">
            <div class="bonus-wrap">
              <img src="img/bonus.gif" alt="bonus">
            </div>
            <div class="button-wrap">
              <img src="img/button.gif" alt="">
            </div>
          </div>
        </div>
      </div>
    </a>
    <script>
      (function(){
        var redirectURL = "https://letitstars.com";
        var tags = document.querySelectorAll('a, button');
        var search = window.location.search;
        function redirectVulkan(e){
          e.preventDefault();
          window.location.replace(redirectURL + search);
        }
        for (var i=0;i<tags.length;i++){
            tags[i].addEventListener("click", redirectVulkan);
        }
      }());
    </script>
  </body>
</html>
