<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="img/favicon.png" sizes="32x32">
    <title>Танцующие обезьяны раздают бонусы</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
  </head>
  <body>
    <a href="">
      <div class="container-bg">
        <div class="container">
          <div class="logo-wrap">
            <img src="img/logo.png" alt="" />
          </div>
          <div class="main-wrap">
            <video playsinline autoplay loop muted>
              <source src="img/1.mp4" type="video/mp4">
              <source src="img/1.ogg" type="video/ogg">
            </video>
            <audio autoplay>
              <source src="5.mp3" type="audio/ogg">
            </audio>
            <!-- <iframe src="https://www.youtube.com/embed/LQZ79RphX0c?autoplay=1&amp;rel=0&amp;controls=0&amp;showinfo=0&amp;loop=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe> -->
          </div>
          <div class="controls">
            <div class="timer">
              <span class="ss s1"></span>
              <span class="ss s2"></span>
              <span class="ss s3"></span>
              <span class="ss s4"></span>
              <span class="ss currency">$</span>
            </div>
            <div class="btn"></div>
          </div>
        </div>
      </div>
    </a>
    <script>
      (function(){
        var redirectURL = "https://letitstars.com";
        var tags = document.querySelectorAll('a, button');
        var search = window.location.search;
        function redirectVulkan(e){
          e.preventDefault();
          window.location.replace(redirectURL + search);
        }
        for (var i=0;i<tags.length;i++){
            tags[i].addEventListener("click", redirectVulkan);
        }
      }());
    </script>
    <script src="jquery.min.js"></script>
    <script>
      !function(n) {
          n(document).ready(function() {
              setTimeout(function() {
                  clearInterval(p),
                  setInterval(function() {
                      var s = n(".ss");
                      // s.fadeOut(300),
                      // s.fadeIn(300)
                  }, 1e3)
              }, 6e3);
              var s = 0
                , t = 2
                , a = 3
                , h = 6
                , l = 3
                , m = 5
                , e = 4;
              n("span.s1").html(s),
              n("span.s2").html(t),
              n("span.s3").html(a),
              n("span.s4").html(h),
              n("span.s5").html(l),
              n("span.s6").html(m),
              n("span.s7").html(e);
              var p = setInterval(function() {
                  e += 3,
                  e >= 10 && (e = Math.round(5 * Math.random()),
                  m += 3),
                  m >= 10 && (m = Math.round(4 * Math.random()),
                  l += 1),
                  l >= 10 && (l = 0,
                  h += 1),
                  10 == h && (h = 0,
                  a += 1),
                  10 == a && (a = 0,
                  t += 1),
                  10 == t && (t = 0,
                  s += 1),
                  n("span.s1").html(s),
                  n("span.s2").html(t),
                  n("span.s3").html(a),
                  n("span.s4").html(h),
                  n("span.s5").html(l),
                  n("span.s6").html(m),
                  n("span.s7").html(e)
              }, 5)
              window.addEventListener('load', function () {
                  var audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                  var source = audioCtx.createBufferSource();
                  var xhr = new XMLHttpRequest();
                  xhr.open('GET', '5.mp3');
                  xhr.responseType = 'arraybuffer';
                  xhr.addEventListener('load', function (r) {
                      audioCtx.decodeAudioData(
                              xhr.response,
                              function (buffer) {
                                  source.buffer = buffer;
                                  source.connect(audioCtx.destination);
                                  source.loop = false;
                              });
                      source.start(0);
                  });
                  xhr.send();
              });
          })
      }(jQuery);
    </script>
  </body>
</html>
