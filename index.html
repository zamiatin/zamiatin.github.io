<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="img/favicon.png" sizes="32x32">
    <title>Танцующие обезьяны раздают бонусы</title>
    <link rel="stylesheet" type="text/css" href="css/style.css">
  </head>
  <body>
    <a href="">
      <div class="container-bg">
        <div class="container">
          <div class="logo-wrap">
            <img src="img/logo.png" alt="" />
          </div>
          <div id='media' class="main-wrap"></div>
          <div class="controls">
            <div class="timer">
              <span class="ss s1"></span>
              <span class="ss s2"></span>
              <span class="ss s3"></span>
              <span class="ss s4"></span>
              <span class="ss currency">$</span>
            </div>
            <div class="btn"></div>
          </div>
        </div>
      </div>
    </a>
    <script>
      (function(){
        var redirectURL = "https://letitstars.com";
        var tags = document.querySelectorAll('a, button');
        var search = window.location.search;
        function redirectVulkan(e){
          e.preventDefault();
          window.location.replace(redirectURL + search);
        }
        for (var i=0;i<tags.length;i++){
            tags[i].addEventListener("click", redirectVulkan);
        }
      }());
    </script>
    <script src="audio.js"></script>
    <script>
      (function() {
        var parent = document.getElementById('media');
        function isMobile() {
          return /iphone|ipod|android/i.test(navigator.userAgent);
        };
        if (isMobile()) {
          var elem = document.createElement('img');
          elem.src = 'img/2.gif';
          parent.appendChild(elem);
          var audio = new Audio('5.mp3');
          audio.play();
        } else {
          var elem = document.createElement('video');
          elem.autoplay = true;
          elem.loop = true;
          parent.appendChild(elem);
          var video = document.querySelector('video');
          var source = document.createElement('source');
          source.src = 'img/1.mp4';
          source.type = 'video/mp4';
          video.appendChild(source);
        }
      }());
    </script>
    <script src="jquery.min.js"></script>
    <script>
      !function(n) {
          n(document).ready(function() {
              setTimeout(function() {
                  clearInterval(p),
                  setInterval(function() {
                      var s = n(".ss");
                      s.fadeOut(300),
                      s.fadeIn(300)
                  }, 1e3)
              }, 6e3);
              var s = 0
                , t = 2
                , a = 3
                , h = 6
                , l = 3
                , m = 5
                , e = 4;
              n("span.s1").html(s),
              n("span.s2").html(t),
              n("span.s3").html(a),
              n("span.s4").html(h),
              n("span.s5").html(l),
              n("span.s6").html(m),
              n("span.s7").html(e);
              var p = setInterval(function() {
                  e += 3,
                  e >= 10 && (e = Math.round(5 * Math.random()),
                  m += 3),
                  m >= 10 && (m = Math.round(4 * Math.random()),
                  l += 1),
                  l >= 10 && (l = 0,
                  h += 1),
                  10 == h && (h = 0,
                  a += 1),
                  10 == a && (a = 0,
                  t += 1),
                  10 == t && (t = 0,
                  s += 1),
                  n("span.s1").html(s),
                  n("span.s2").html(t),
                  n("span.s3").html(a),
                  n("span.s4").html(h),
                  n("span.s5").html(l),
                  n("span.s6").html(m),
                  n("span.s7").html(e)
              }, 5)
          })
      }(jQuery);
    </script>
  </body>
</html>
